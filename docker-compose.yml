version: '3.9'

services:
  backend:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./github_app.pem:/app/github_app.pem:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s